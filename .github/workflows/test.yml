name: 🦊 Plugin Health Check

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  test:
    name: Plugin & API Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript typecheck
        id: typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: Build check
        id: build
        run: npm run build
        continue-on-error: true

      - name: Plugin health check
        id: plugin-test
        run: npm run test:plugins || echo "TEST_FAILED=true" >> $GITHUB_ENV
        continue-on-error: true

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(TZ='Asia/Makassar' date '+%Y-%m-%d %H:%M:%S WITA')
          BRANCH=${GITHUB_REF#refs/heads/}
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' $GITHUB_SHA)

          HAS_ERROR=false
          ERRORS=""

          if [ "${{ steps.typecheck.outcome }}" = "failure" ]; then
            HAS_ERROR=true
            ERRORS="${ERRORS}❌ *TypeScript typecheck gagal*\n\n"
          fi
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            HAS_ERROR=true
            ERRORS="${ERRORS}❌ *Build gagal*\n\n"
          fi
          if [ "${{ env.TEST_FAILED }}" = "true" ]; then
            HAS_ERROR=true
          fi

          if [ "$HAS_ERROR" = "true" ]; then
            STATUS="🔴 *Test Gagal*"
            if [ -f test-results.md ]; then
              REPORT=$(cat test-results.md)
            else
              REPORT=""
            fi
            BODY="${ERRORS}${REPORT}"
          else
            STATUS="🟢 *Test Berhasil*"
            if [ -f test-results.md ]; then
              PLUGINS_LINE=$(grep "Plugins:" test-results.md || echo "")
              APIS_LINE=$(grep "APIs:" test-results.md || echo "")
              DURATION_LINE=$(grep "Duration:" test-results.md || echo "")
              BODY="✅ Semua plugin dan API dalam kondisi baik\n\n${PLUGINS_LINE}\n${APIS_LINE}\n${DURATION_LINE}"
            else
              BODY="✅ Semua test lulus tanpa error"
            fi
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"🦊 Foxy Bot — ${STATUS}\n🕒 \`${TIMESTAMP}\`\n👤 \`${GITHUB_ACTOR}\`\n🌿 \`${BRANCH}\`\n📝 \`${GITHUB_SHA:0:7}\`\n💬 \`${COMMIT_MSG}\`\n\n${BODY}\n🔗 Full log: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\",\"parse_mode\":\"Markdown\",\"disable_web_page_preview\":true}"
